name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          LDFLAGS="-s -w -X main.version=${VERSION}"

          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o centreon-mcp-go-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o centreon-mcp-go-linux-arm64 .
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o centreon-mcp-go-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o centreon-mcp-go-darwin-arm64 .
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" -o centreon-mcp-go-windows-amd64.exe .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            centreon-mcp-go-linux-amd64
            centreon-mcp-go-linux-arm64
            centreon-mcp-go-darwin-amd64
            centreon-mcp-go-darwin-arm64
            centreon-mcp-go-windows-amd64.exe
